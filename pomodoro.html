<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄闹钟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /*
   * ========================================
   * CSS 自定义属性（变量）—— 主题色系统
   * ========================================
   * 暖色调大地色系 · 精致版（Refined Earth-Tone）
   * 修改变量值即可一键换肤。
   */
  :root {
    --work: #c45c4a;
    --work-glow: rgba(196, 92, 74, 0.35);
    --work-soft: rgba(196, 92, 74, 0.10);
    --short-break: #5f8a70;
    --short-break-glow: rgba(95, 138, 112, 0.35);
    --short-break-soft: rgba(95, 138, 112, 0.10);
    --long-break: #7b92b8;
    --long-break-glow: rgba(123, 146, 184, 0.35);
    --long-break-soft: rgba(123, 146, 184, 0.10);
    --bg: #f5ede7;
    --bg-warm: #efe5dc;
    --card: rgba(255, 255, 255, 0.72);
    --card-border: rgba(255, 255, 255, 0.9);
    --text: #2e261f;
    --text-secondary: #8d7e73;
    --ring-bg: rgba(200, 186, 175, 0.30);
    --ring-track: rgba(200, 186, 175, 0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /*
   * 背景层：暖色渐变 + 噪点纹理 + 装饰光斑
   * 告别纯平背景，营造温暖有深度的氛围
   */
  body {
    font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 60% 50% at 25% 20%, rgba(196, 92, 74, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 75%, rgba(95, 138, 112, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255, 250, 245, 0.5) 0%, transparent 60%),
      linear-gradient(165deg, #f5ede7 0%, #efe5dc 40%, #f0e6dd 100%);
    user-select: none;
    -webkit-user-select: none;
    position: relative;
    overflow: hidden;
  }

  /* 噪点纹理叠层 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 256px;
    pointer-events: none;
    z-index: 0;
  }

  /*
   * 卡片容器：毛玻璃质感 + 精致边框 + 柔和投影
   * 从平面白卡升级为有层次感的玻璃容器
   */
  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    backdrop-filter: blur(40px) saturate(1.2);
    -webkit-backdrop-filter: blur(40px) saturate(1.2);
    border: 1px solid var(--card-border);
    border-radius: 36px;
    padding: 44px 48px 36px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 20px 60px -15px rgba(120, 90, 70, 0.12),
      0 4px 12px rgba(120, 90, 70, 0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 420px;
    max-width: 94vw;
    animation: cardEnter 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
  }

  @keyframes cardEnter {
    from {
      opacity: 0;
      transform: translateY(20px) scale(0.97);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /*
   * ========================================
   * 模式切换标签栏
   * ========================================
   * 更精致的胶囊式分段控件
   * 内层滑块带有微妙的投影和过渡动画
   */
  .modes {
    display: flex;
    gap: 2px;
    background: rgba(200, 186, 175, 0.18);
    border-radius: 14px;
    padding: 3px;
    margin-bottom: 36px;
    width: 100%;
    position: relative;
  }

  .mode-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px 8px;
    border-radius: 11px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text-secondary);
    cursor: pointer;
    transition: color 0.3s, background 0.3s, box-shadow 0.3s;
    white-space: nowrap;
    position: relative;
    z-index: 1;
  }

  .mode-btn.active {
    background: rgba(255, 255, 255, 0.85);
    box-shadow: 0 1px 6px rgba(120, 90, 70, 0.08), 0 0 0 0.5px rgba(255,255,255,0.5);
  }

  .mode-btn.work.active    { color: var(--work); }
  .mode-btn.sbreak.active  { color: var(--short-break); }
  .mode-btn.lbreak.active  { color: var(--long-break); }

  /*
   * ========================================
   * SVG 圆形进度环
   * ========================================
   * 双层圆环设计：
   *   - 外层：极细的装饰轨道
   *   - 内层：主进度环，带渐变和光晕效果
   */
  .ring-container {
    position: relative;
    width: 260px;
    height: 260px;
    margin-bottom: 32px;
  }

  .ring-svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 0 transparent);
    transition: filter 0.5s;
  }

  .ring-svg.work    { filter: drop-shadow(0 0 12px var(--work-glow)); }
  .ring-svg.sbreak  { filter: drop-shadow(0 0 12px var(--short-break-glow)); }
  .ring-svg.lbreak  { filter: drop-shadow(0 0 12px var(--long-break-glow)); }

  /* 外层装饰轨道 */
  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 1;
  }

  /* 底色圆环 */
  .ring-bg {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 8;
  }

  /* 进度圆环：圆角端点 + 平滑过渡 */
  .ring-progress {
    fill: none;
    stroke: var(--work);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s;
  }

  .ring-progress.work    { stroke: var(--work); }
  .ring-progress.sbreak  { stroke: var(--short-break); }
  .ring-progress.lbreak  { stroke: var(--long-break); }

  /*
   * 时间显示：居中于圆环
   * 使用 DM Serif Display 衬线字体，增添优雅气质
   */
  .timer-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 56px;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
  }

  .status-label {
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-top: 8px;
  }

  /* idle 状态下时间的微弱呼吸动画 */
  .time.breathing {
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /*
   * ========================================
   * 控制按钮
   * ========================================
   * 主按钮：更大更圆，带色彩光晕
   * 重置按钮：纤细精致，图标化
   */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .btn:active { transform: scale(0.93); }

  .btn-start {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    font-size: 28px;
    font-weight: 600;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--work);
  }

  /* 按钮外圈光晕 */
  .btn-start::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-start.work::after    { box-shadow: 0 0 20px var(--work-glow); }
  .btn-start.sbreak::after  { box-shadow: 0 0 20px var(--short-break-glow); }
  .btn-start.lbreak::after  { box-shadow: 0 0 20px var(--long-break-glow); }

  .btn-start.running::after { opacity: 1; }

  .btn-start.work    { background: var(--work); }
  .btn-start.sbreak  { background: var(--short-break); }
  .btn-start.lbreak  { background: var(--long-break); }

  .btn-start:hover  { transform: scale(1.06); }
  .btn-start:active { transform: scale(0.94); }

  .btn-reset {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(200, 186, 175, 0.15);
    border: 1px solid rgba(200, 186, 175, 0.2);
    color: var(--text-secondary);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-reset:hover {
    background: rgba(200, 186, 175, 0.25);
    color: var(--text);
  }

  /*
   * ========================================
   * 番茄计数圆点
   * ========================================
   * 更精致的圆点设计：空心 → 实心填充 + 光晕
   */
  .sessions {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: transparent;
    border: 1.5px solid rgba(200, 186, 175, 0.4);
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .dot.done {
    background: var(--work);
    border-color: var(--work);
    box-shadow: 0 0 0 3px var(--work-soft);
    transform: scale(1.1);
  }

  /*
   * ========================================
   * 响应式布局
   * ========================================
   */
  @media (max-width: 440px) {
    .card { padding: 28px 20px 24px; border-radius: 28px; }
    .ring-container { width: 210px; height: 210px; }
    .time { font-size: 44px; }
    .mode-btn { font-size: 12px; padding: 8px 4px; }
  }
</style>
</head>
<body>

<div class="card">
  <!-- 模式切换标签栏 -->
  <div class="modes">
    <button class="mode-btn work active" data-mode="work">工作 · 25分钟</button>
    <button class="mode-btn sbreak" data-mode="sbreak">短休息 · 5分钟</button>
    <button class="mode-btn lbreak" data-mode="lbreak">长休息 · 15分钟</button>
  </div>

  <!-- 进度环 + 时间显示 -->
  <div class="ring-container">
    <svg class="ring-svg work" viewBox="0 0 280 280">
      <!-- 外层装饰轨道 -->
      <circle class="ring-track" cx="140" cy="140" r="134"/>
      <!-- 底色圆环 -->
      <circle class="ring-bg" cx="140" cy="140" r="126"/>
      <!-- 进度圆环 -->
      <circle class="ring-progress work" id="ring" cx="140" cy="140" r="126"
              stroke-dasharray="791.68" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-display">
      <div class="time breathing" id="time">25:00</div>
      <div class="status-label" id="status">准备开始</div>
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="controls">
    <button class="btn btn-start work" id="btnStart" title="开始">▶</button>
    <button class="btn btn-reset" id="btnReset" title="重置">↺</button>
  </div>

  <!-- 番茄计数圆点 -->
  <div class="sessions" id="sessions">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</div>

<script>
/*
 * ================================================================
 * 全局常量
 * ================================================================
 */

const CIRCUMFERENCE = 2 * Math.PI * 126;

const MODES = {
  work:    { label: '专注', minutes: 25, cls: 'work' },
  sbreak:  { label: '短休息', minutes: 5,  cls: 'sbreak' },
  lbreak:  { label: '长休息', minutes: 15, cls: 'lbreak' },
};

let state = {
  mode: 'work',
  totalSeconds: MODES.work.minutes * 60,
  remainingSeconds: MODES.work.minutes * 60,
  timerId: null,
  running: false,
  completedSessions: 0,
};

const ring        = document.getElementById('ring');
const timeEl      = document.getElementById('time');
const statusEl    = document.getElementById('status');
const btnStart    = document.getElementById('btnStart');
const sessionsEl  = document.getElementById('sessions');

// ================================================================
// 渲染函数
// ================================================================

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function updateRing() {
  const fraction = state.remainingSeconds / state.totalSeconds;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
}

function setModeClass(el, cls) {
  el.classList.remove('work', 'sbreak', 'lbreak');
  el.classList.add(cls);
}

function updateUI() {
  timeEl.textContent = formatTime(state.remainingSeconds);
  updateRing();

  setModeClass(ring.closest('.ring-svg'), MODES[state.mode].cls);
  setModeClass(ring, MODES[state.mode].cls);
  setModeClass(btnStart, MODES[state.mode].cls);

  // 按钮图标 & 运行态
  btnStart.textContent = state.running ? '⏸' : '▶';
  if (state.running) {
    btnStart.classList.add('running');
    timeEl.classList.remove('breathing');
  } else {
    btnStart.classList.remove('running');
    // 仅在未开始时显示呼吸动画
    if (state.remainingSeconds === state.totalSeconds) {
      timeEl.classList.add('breathing');
    } else {
      timeEl.classList.remove('breathing');
    }
  }

  // 状态文字
  if (state.running) {
    statusEl.textContent = MODES[state.mode].label + '中...';
  } else if (state.remainingSeconds < state.totalSeconds) {
    statusEl.textContent = '已暂停';
  } else {
    statusEl.textContent = '准备开始';
  }

  // 模式标签高亮
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === state.mode);
  });

  renderDots();
}

function renderDots() {
  let html = '';
  for (let i = 0; i < 4; i++) {
    const done = i < (state.completedSessions % 4);
    html += `<span class="dot${done ? ' done' : ''}"></span>`;
  }
  sessionsEl.innerHTML = html;
}

// ================================================================
// 计时器核心逻辑
// ================================================================

function tick() {
  if (state.remainingSeconds <= 0) return;
  state.remainingSeconds--;
  updateUI();
  if (state.remainingSeconds <= 0) finish();
}

function start() {
  if (state.running) return;
  if (state.remainingSeconds <= 0) return;
  state.running = true;
  state.timerId = setInterval(tick, 1000);
  updateUI();
}

function pause() {
  state.running = false;
  if (state.timerId) {
    clearInterval(state.timerId);
    state.timerId = null;
  }
  updateUI();
}

function reset() {
  pause();
  state.remainingSeconds = state.totalSeconds;
  updateUI();
}

function switchMode(mode) {
  pause();
  state.mode = mode;
  state.totalSeconds = MODES[mode].minutes * 60;
  state.remainingSeconds = state.totalSeconds;
  updateUI();
}

function finish() {
  pause();
  state.remainingSeconds = 0;

  if (state.mode === 'work') {
    state.completedSessions++;
    if (state.completedSessions % 4 === 0) {
      switchMode('lbreak');
      statusEl.textContent = '完成！进入长休息';
    } else {
      switchMode('sbreak');
      statusEl.textContent = '完成！进入短休息';
    }
  } else {
    switchMode('work');
    statusEl.textContent = '休息结束，开始专注';
  }

  playSound();
  sendNotification();
  updateUI();
}

// ================================================================
// 音频系统（Web Audio API）
// ================================================================

function playSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [800, 1000, 1200];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.2 + 0.5);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.2);
      osc.stop(ctx.currentTime + i * 0.2 + 0.5);
    });
  } catch (_) {}
}

// ================================================================
// 桌面通知系统
// ================================================================

function sendNotification() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    const title = state.mode === 'work'
      ? '专注完成！休息一下吧 ☕'
      : '休息结束！开始新一轮专注 💪';
    new Notification('番茄闹钟', {
      body: title,
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍅</text></svg>'
    });
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

// ================================================================
// 事件监听
// ================================================================

btnStart.addEventListener('click', () => {
  if (state.remainingSeconds <= 0) { reset(); return; }
  if (state.running) pause();
  else start();
});

document.getElementById('btnReset').addEventListener('click', reset);

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    btnStart.click();
  } else if (e.code === 'KeyR') {
    reset();
  } else if (e.code === 'Digit1') {
    switchMode('work');
  } else if (e.code === 'Digit2') {
    switchMode('sbreak');
  } else if (e.code === 'Digit3') {
    switchMode('lbreak');
  }
});

document.addEventListener('click', () => {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}, { once: true });

// 初始化
updateUI();
</script>
</body>
</html>
